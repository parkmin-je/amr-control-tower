spring:
  application:
    name: amr-dashboard

  profiles:
    active: dev

  thymeleaf:
    cache: false

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ROS rosbridge 연결 설정
rosbridge:
  uri: ws://localhost:9090
  reconnect-delay-ms: 3000
  robot-id: robot-01

# 로봇 상태 저장 주기 (ms)
robot:
  status-save-interval-ms: 1000

server:
  port: 8080

logging:
  level:
    com.amr.dashboard: DEBUG
